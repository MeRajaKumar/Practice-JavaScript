<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toggle Paragraph Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        #toggleButton {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        #toggleParagraph {
            margin-top: 20px;
            display: none; /* Initially hidden */
        }
    </style>
</head>
<body>
    <!-- Button to toggle paragraph visibility -->
    <button id="toggleButton">Show Paragraph</button>
    <p id="toggleParagraph">This is a paragraph that can be toggled.</p>

    <!-- <script>
        const toggleButton = document.getElementById('toggleButton');
        const paragraph = document.getElementById('toggleParagraph');

        toggleButton.addEventListener('click', function() {
            if (paragraph.style.display === 'none') {
                paragraph.style.display = 'block';
                toggleButton.innerText = 'Hide Paragraph';
            } else {
                paragraph.style.display = 'none';
                toggleButton.innerText = 'Show Paragraph';
            }
        });
    </script> -->

    <script>
        $(document).ready(function() {
            $('#toggleButton').click(function() {
                $('#toggleParagraph').slideToggle(200); // Optional animation
                const isVisible = $('#toggleParagraph').is(':visible');
                $(this).text(isVisible ? 'Hide Paragraph' : 'Show Paragraph');
            });
        });
    </script>
</body>
</html>
