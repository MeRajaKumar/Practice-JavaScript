<!-- *Web Development Project-1*

*Build a To-Do List App with HTML, CSS & JavaScript*

*What you’ll learn today:*

- Creating and structuring HTML elements
- Styling with CSS for a clean UI
- Adding tasks dynamically with JavaScript
- Marking tasks as completed
- Deleting tasks
- Saving tasks to browser’s localStorage so they persist

*Step 1: Set up the HTML*

Create a file called index.html and add: -->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>To-Do List App</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
  font-family: Arial, sans-serif;
  background: #f4f7f8;
  display: flex;
  justify-content: center;
  padding: 50px;
}

.container {
  background: white;
  padding: 30px;
  width: 400px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
}

h1 {
  text-align: center;
}

#todo-form {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

#todo-input {
  flex: 1;
  padding: 10px;
  border-radius: 4px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 15px;
  border: none;
  background-color: #28a745;
  color: white;
  font-weight: bold;
  border-radius: 4px;
  cursor: pointer;
}

button:hover {
  background-color: #218838;
}

#todo-list {
  list-style: none;
  padding: 0;
}

.todo-item {
  padding: 12px 10px;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.todo-item.completed {
  text-decoration: line-through;
  color: gray;
}

.delete-btn {
  background: #dc3545;
  border: none;
  color: white;
  border-radius: 50%;
  cursor: pointer;
  width: 24px;
  height: 24px;
  font-weight: bold;
  line-height: 20px;
}
    </style>
</head>

<body>
    <div class="container">
        <h1>My To-Do List</h1>
        <form id="todo-form">
            <input type="text" id="todo-input" placeholder="Add new task..." required />
            <button type="submit">Add</button>
        </form>
        <ul id="todo-list"></ul>
    </div>
    <script>

        // Select DOM elements
        const todoForm = document.getElementById('todo-form');
        const todoInput = document.getElementById('todo-input');
        const todoList = document.getElementById('todo-list');

        let todos = [];

        // Load todos from localStorage on page load
        window.onload = () => {
            const storedTodos = JSON.parse(localStorage.getItem('todos'));
            if (storedTodos) {
                todos = storedTodos;
                todos.forEach(todo => addTodoToDOM(todo));
            }
        };

        // Add todo item to DOM
        function addTodoToDOM(todo) {
            const li = document.createElement('li');
            li.classList.add('todo-item');
            if (todo.completed) li.classList.add('completed');
            li.setAttribute('data-id', todo.id);

            li.innerHTML = `
    <span>${todo.text}</span>
    <button class="delete-btn">&times;</button>
  `;

            // Toggle completed on click
            li.querySelector('span').addEventListener('click', () => {
                toggleComplete(todo.id, li);
            });

            // Delete todo on delete button click
            li.querySelector('.delete-btn').addEventListener('click', () => {
                deleteTodo(todo.id, li);
            });

            todoList.appendChild(li);
        }

        // Add todo on form submit
        todoForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const text = todoInput.value.trim();
            if (text !== '') {
                const newTodo = {
                    id: Date.now().toString(),
                    text,
                    completed: false,
                };
                todos.push(newTodo);
                addTodoToDOM(newTodo);
                saveTodos();
                todoInput.value = '';
            }
        });

        // Toggle completed state
        function toggleComplete(id, listItem) {
            todos = todos.map(todo => {
                if (todo.id === id) {
                    todo.completed = !todo.completed;
                    if (todo.completed) {
                        listItem.classList.add('completed');
                    } else {
                        listItem.classList.remove('completed');
                    }
                }
                return todo;
            });
            saveTodos();
        }

        // Delete todo
        function deleteTodo(id, listItem) {
            todos = todos.filter(todo => todo.id !== id);
            todoList.removeChild(listItem);
            saveTodos();
        }

        // Save todos to localStorage
        function saveTodos() {
            localStorage.setItem('todos', JSON.stringify(todos));
        }

    </script>
    <script src="script.js"></script>
</body>

</html>
