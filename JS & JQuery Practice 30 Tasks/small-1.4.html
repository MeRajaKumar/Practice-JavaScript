<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Document</title>
  <style>
    .parentdiv {
      height: 100vh;
      width: 100%;
      display: flex;
      justify-content: space-around;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: blue;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: 1.3rem;
    }

    .btnclick {
      padding: 3px 40px;
      color: #fff;
      background-color: blueviolet;
      font-size: 1.3rem;
      cursor: pointer;
    }

    .btnclick:hover {
      padding: 4px 42px;
    }

    /* Custom class to be added/removed */
    .highlight {
      color: white;
      background-color: darkgreen;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
    }
  </style>
</head>
<body>
    <!-- question: add or remove class - Add a class to an element when a button is clicked, and remove it when another button is clicked.
    funtion: two button and after running this file doesn't container the class file after clicking the button it containe the css file! -->

  <div class="parentdiv">
    <h1 id="heading">This is my JavaScript Practice Page!</h1>
    <div>
      <button class="btnclick" onclick="removeClass()">Remove Class</button>
      <button class="btnclick" onclick="addClass()">Add Class</button>
    </div>
  </div>

  <script>
    const heading = document.getElementById("heading");

    function addClass() {
      heading.classList.add("highlight");
    }

    function removeClass() {
      heading.classList.remove("highlight");
    }
  </script>
</body>
</html>
